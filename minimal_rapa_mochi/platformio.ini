; ============================================================================
;  PlatformIO - Dasai Mochi FASE 1 (solo OLED) para ESP32-WROOM-32
;  Opcional: el flujo principal recomendado es Arduino IDE (ver README.md).
;
;  Uso:
;    pio run                 -> compila
;    pio run -t upload       -> compila y sube
;    pio device monitor      -> abre el monitor serie a 115200
;
;  "board = esp32dev" es el ESP32 Dev Module / ESP32-WROOM-32 generico.
;  No se usa PSRAM, USB nativo ni nada del ESP32-S3.
; ============================================================================

[platformio]
; Permite mantener el .ino en esta misma carpeta (sin mover a src/).
src_dir = .

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Velocidades de carga y monitor
upload_speed  = 921600
monitor_speed = 115200

; Dependencias: solo U8g2 (incluye su propio soporte de I2C/Wire)
lib_deps =
    olikraus/U8g2 @ ^2.35.19
